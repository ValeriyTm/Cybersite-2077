name: Cybersite-2077 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: "npm"

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: npm ci

      #   # 4. Проверка линтером
      #   - name: Run Lint
      #     run: npm run lint:js
      #     env:
      #       NODE_OPTIONS: "--max-old-space-size=4096"

      # 5. Проверка типов TypeScript
      - name: Type check
        run: npm run type-check

      # 6. Запуск Unit-тестов и интеграционных тестов на фронтенде
      - name: Run Unit Tests
        run: npm run test -w web

      # 7. Сборка фронтенда
      - name: Build Web App
        run: npm run build -w web
