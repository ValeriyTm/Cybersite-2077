tags:
  - name: подмодуль Auth (модуль Identity)
    description: Регистрация, логин и управление сессиями
  - name: подмодуль Profile (модуль Identity)
    description: Данные пользователя и настройки профиля

paths:
  /register:
    post:
      tags:
        - Auth
      summary: Регистрация нового пользователя
      description: Создает аккаунт и отправляет письмо для подтверждения
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Успешная регистрация и создание записи в БД в таблице Users
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Пользователь создан!"
                  user:
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: "dff1ff06-2668-4ca6-a199-5a4f742ca02a"
                      email:
                        type: string
                        format: email
                        example: "test@example.com"
        "400":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              examples:
                EmailConflict:
                  value: { "message": "Некорректный email или пароль" }
                  summary: Скрытая ошибка дубликата почты
                NameConflict:
                  value: { "message": "Это имя уже занято, выберите другое" }
                  summary: Ошибка дубликата логина

  /login:
    post:
      tags:
        - Auth
      summary: Авторизация (Логин)
      description: Стандартный вход в профиль пользователя. Если включена 2FA, возвращает информацию для второго шага
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Успешный вход или шаг 2FA
          # В ответе в куках помещаем refresh-токен:
          headers:
            Set-Cookie:
              $ref: "#/components/headers/SetRefreshCookie"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthSuccessResponse"
                  - $ref: "#/components/schemas/Login2FARequiredResponse"
        "401":
          description: Неверный логин или пароль
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Неверный email или пароль"
        "403":
          description: Аккаунт не активирован
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Аккаунт не активирован. Проверьте почту."

  /profile/me:
    get:
      tags:
        - Profile
      summary: Получение данных текущего пользователя
      description: Возвращает полную информацию о профиле для ProfilePage
      security:
        # Для доступа к этому эндпоинту нужен JWT токен (Access token):
        - bearerAuth: []
      responses:
        "200":
          description: Данные профиля успешно получены
          content:
            application/json:
              schema:
                $ref: "../components/schemas.yaml#/User"

  /profile/update:
    patch:
      tags:
        - Profile
      summary: Редактирование текстовых данных профиля
      description: Обновление имени, даты рождения, телефона и пола пользователя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"

      responses:
        "200":
          description: Успешное обновление профиля
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Профиль успешно обновлен"
                  user:
                    $ref: "../components/schemas.yaml#/User"

  /profile/avatar:
    patch:
      tags:
        - Profile
      summary: Загрузка или обновление аватара
      description: Принимает файл изображения и сохраняет на сервере
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Файл изображения (jpg, png)
      responses:
        "200":
          description: Аватар успешно обновлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Аватар обновлен"
                  avatarUrl:
                    type: string
                    example: "/uploads/avatars/avatar-1774609004286-587742782.jpg"
        "400":
          description: Аватар не удалось загрузить
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Только изображения (jpeg, jpg, png, webp) до 2МБ"

  /logout:
    post:
      tags:
        - Auth
      summary: Выход из текущей сессии
      description: Удаляет Refresh-токен из куки и инвалидирует текущую сессию
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Успешный выход
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Выход выполнен успешно"

  /logout-all:
    post:
      tags:
        - Auth
      summary: Выход со всех устройств
      description: Инвалидирует все активные сессии пользователя в базе данных
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Все сессии завершены
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Выход со всех устройств выполнен успешно"

  /refresh:
    post:
      tags: [Auth]
      summary: Обновление пары токенов (access и refresh)
      # Куки (refresh токен) в запросе:
      parameters:
        - in: cookie
          name: refreshToken #Имя куки, которое ищет бэкенд
          required: true
          schema:
            type: string
      description: Сервер принимает refreshToken из куки и выдает новую пару токенов.
      responses:
        "200":
          description: Токены обновлены
          headers:
            Set-Cookie:
              $ref: "#/components/headers/SetRefreshCookie"
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    $ref: "../components/schemas.yaml#/AccessToken"
                  user:
                    $ref: "../components/schemas.yaml#/User"

        "401":
          description: Refresh-токен невалиден или просрочен
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Сессия не найдена"

  /change-password:
    patch:
      tags:
        - Auth
      summary: Смена пароля из профиля
      description: Изменение пароля пользователя в форме в профиле
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Успешное изменение пароля
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Пароль успешно изменен"
        "400":
          description: Неудачное изменение пароля (текущий пароль введен неверно)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Текущий пароль введен неверно"

  /delete-account:
    delete:
      tags:
        - Auth
      summary: Удаление аккаунта
      description: Полное удаление аккаунта пользователя
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  $ref: "../components/schemas.yaml#/UserPassword"
      responses:
        "204":
          description: Успех в удалении аккаунта
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Аккаунт успешно удален"
        "400":
          description: Неудача в удалении аккаунта
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Неверный пароль для удаления аккаунта"

  /activate/{token}:
    get:
      tags:
        - Auth
      summary: Активация аккаунта
      description: Принимает токен из ссылки в письме, активирует пользователя в БД и перенаправляет на фронтенд
      parameters:
        - name: token
          in: path
          required: true
          description: Уникальный токен активации из письма
          schema:
            type: string
            example: "abc123token"
      responses:
        "302":
          description: Успешная активация. Редирект на фронтенд с параметром успеха.
          headers:
            Location:
              description: URL фронтенда с флагом активации
              schema:
                type: string
                example: "http://localhost:5173/auth?activated=true"
        "400":
          description: Токен невалиден или срок его действия истек
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Неверный или просроченный токен активации"

  /forgot-password:
    post:
      tags:
        - Auth
      summary: Запрос на восстановление пароля
      description: Отправляет письмо с токеном на email для перехода на форму восстановления пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  $ref: "../components/schemas.yaml#/UserEmail"
                captchaToken:
                  $ref: "../components/schemas.yaml#/CaptchaToken"
      responses:
        "200":
          description: Письмо со ссылкой на восстановление пароля отправлено юзеру
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Если такой email зарегистрирован, письмо со ссылкой отправлено."

  /reset-password:
    post:
      tags:
        - Auth
      summary: Установка нового пароля
      description: Восстановление пароля (использует токен из письма для смены пароля)
      parameters:
        -name: token
        in: query
        required: true
        schema:
          type: string
          example: "0b6fe4cea681b84f160396eb8ba00c96c8937cf78fbcf561d08613f73dadc267"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, confirmPassword, captchaToken]
              properties:
                password:
                  $ref: "../components/schemas.yaml#/UserPassword"
                confirmPassword:
                  $ref: "../components/schemas.yaml#/UserPassword"
                captchaToken:
                  $ref: "../components/schemas.yaml#/CaptchaToken"
      responses:
        "200":
          description: Пароль успешно изменен
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Пароль успешно изменен. Теперь вы можете войти."

  /2fa/setup:
    get:
      tags:
        - Auth
      summary: Инициация настройки 2FA
      description: На сервере генерируется секретный ключ и QR-код для сканирования в приложении (Google Authenticator). Ссылка на qr-код посылается клиенту
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Данные для настройки получены
          content:
            application/json:
              schema:
                type: object
                properties:
                  qrCodeUrl:
                    type: string
                    example: "data:image/png;base64,..."
                    description: Ссылка для отображения QR-кода

  /2fa/enable:
    post:
      tags:
        - Auth
      summary: Активация 2FA
      description: Проверяет первый код из приложения и окончательно активирует 2FA для аккаунта пользователя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: "^[0-9]{6}$"
                  example: "123456"
                  description: 6-значный код из приложения аутентификатора
      responses:
        "200":
          description: Активация 2FA для аккаунта пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "2FA успешно включена"
        "400":
          description: Неверный код подтверждения
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Неверный код подтверждения"

  /2fa/verify:
    post:
      tags:
        - Auth
      summary: Проверка кода 2FA при входе в аккаунт
      description: Принимает временный ID пользователя и 6-значный код из приложения для завершения авторизации.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, code] #  userId берем из ответа /login
              properties:
                userId:
                  type: string
                  format: uuid
                  description: Временный идентификатор пользователя
                  example: "a14c494e-2e2f-4622-9218-d5f5e770b09c"
                code:
                  type: string
                  description: Шестизначный код из Google Authenticator
                  pattern: "^[0-9]{6}$"
                  example: "123456"
      responses:
        "200":
          description: Успешный вход - выдаются токены и информация о пользователе
          headers:
            Set-Cookie:
              $ref: "#/components/headers/SetRefreshCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "401":
          description: Ошибка идентификации пользователя при входе с 2FA
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Неверный код 2FA"

  /google:
    get:
      tags:
        - Auth
      summary: Инициация входа через Google (OAuth + OIDC)
      description: Перенаправляет пользователя на страницу выбора аккаунта Google.
      responses:
        "302":
          description: Редирект на Google OAuth сервер
          headers:
            Location:
              schema:
                type: string
                example: "https://accounts.google.com?..."

  /google/callback:
    get:
      tags:
        - Auth
      summary: Обработка ответа от Google (OAuth + OIDC)
      description: Принимает код авторизации от Google, обменивает его на профиль пользователя и выдает токены нашего приложения.
      parameters:
        - name: code
          in: query
          required: true
          description: Код авторизации, предоставленный Google
          schema:
            type: string
      responses:
        "302":
          description: Успешный вход. Редирект на фронтенд с токеном в URL или установка Refresh-куки.
          headers:
            Location:
              schema:
                type: string
                example: "http://localhost:5173/auth/success?token=..."
        "400":
          description: Ошибка авторизации (неверный код или отмена пользователем)

components:
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password, captchaToken]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 20
          pattern: ^[a-z0-9_]+$
          description: Для имени используйте только латиницу, цифры и нижнее подчеркивание
          example: "user_123"
        email:
          $ref: "../components/schemas.yaml#/UserEmail"
        password:
          $ref: "../components/schemas.yaml#/UserPassword"
        captchaToken:
          $ref: "../components/schemas.yaml#/CaptchaToken"

    LoginRequest:
      type: object
      required: [email, password, captchaToken, rememberMe]
      properties:
        email:
          $ref: "../components/schemas.yaml#/UserEmail"
        password:
          $ref: "../components/schemas.yaml#/UserPassword"
        captchaToken:
          $ref: "../components/schemas.yaml#/CaptchaToken"
        rememberMe:
          type: boolean
          description: флаг для определения типа куки, которые будут отправлены сервером.

    AuthSuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: "Вход выполнен успешно"
        accessToken:
          $ref: "../components/schemas.yaml#/AccessToken"
        user:
          $ref: "#/components/schemas/User"

    Login2FARequiredResponse:
      type: object
      properties:
        requires2FA:
          type: boolean
          description: Флаг, необходимый для включения 2FA (заставляет пользователя проходить второй этап для входа в аккаунт)
          example: true
        userId:
          type: string
          format: uuid
          description: ID пользователя для последующей верификации кода
          example: "a14c494e-2e2f-4622-9218-d5f5e770b09c"

    ChangePasswordRequest:
      type: object
      required: [currentPassword, confirmPassword, newPassword]
      properties:
        currentPassword:
          $ref: "../components/schemas.yaml#/UserPassword"
        confirmPassword:
          $ref: "../components/schemas.yaml#/UserPassword"
        newPassword:
          $ref: "../components/schemas.yaml#/UserPassword"

    User:
      $ref: "../components/schemas.yaml#/User"

    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 20
          example: "user_123"
        birthday:
          type: string
          format: date
          nullable: true
          description: Дата рождения (ДД.ММ.ГГГГ в UI, YYYY-MM-DD на сервере)
          example: "1995-05-20"
        phone:
          type: string
          nullable: true
          description: Номер телефона в международном формате
          example: "+7 (999) 123-45-67"
        gender:
          type: string
          nullable: true
          enum: [MALE, FEMALE]
          description: Пол пользователя (Enum из Prisma)
          example: "MALE"

  headers:
    SetRefreshCookie:
      description: Установка Refresh-токена в HttpOnly куку
      schema:
        type: string
        example: "refreshToken=abc123...; HttpOnly; Secure; SameSite=Strict; Path=/api/identity/auth/refresh"
