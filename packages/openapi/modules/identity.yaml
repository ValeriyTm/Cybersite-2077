      responses:
        "200":
          description: Письмо со ссылкой на восстановление пароля отправлено юзеру
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Если такой email зарегистрирован, письмо со ссылкой отправлено."

  /reset-password:
    post:
      tags:
        - Auth
      summary: Установка нового пароля
      description: Восстановление пароля (использует токен из письма для смены пароля)
      parameters:
        -name: token
        in: query
        required: true
        schema:
          type: string
          example: "0b6fe4cea681b84f160396eb8ba00c96c8937cf78fbcf561d08613f73dadc267"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, confirmPassword, captchaToken]
              properties:
                password:
                  type: string
                  format: password
                  minLength: 1
                  description: Новый пароль пользователя
                  example: "SafePassword123!"
                confirmPassword:
                  type: string
                  format: password
                  minLength: 1
                  description: Новый пароль пользователя (повторное введение)
                  example: "SafePassword123!"
                captchaToken:
                  type: string
                  description: Токен от Google ReCaptcha
                  example: "0cAFcWeA5GUva0glN3oazkHic0c2eNxVim-nvkuBAAwcwF2EkqBECmcAupWopACqRiMPpFQ_715TUVPgg0g-WwiI3VYRj5nZz46id_mOtz3biQJMUIKnrUEKEylXtUT0gIckOylmSCfsz55G2GsL14nr6gcrDx-Cj9IDZlGtCQs8WMfzdIY6mjTZB7dyPph6NmgZqB-eRn0aUxQgCDlUcyoVApdcDjTCXPcjNoNOSpvnwbCNgIeK9fWTAxRPNzpNpowe5PUJzV79Gw6yZtzffWcHfhiSLshybtBAF-i9gF7__0gK0GHOQyAwGnAMgwp5sRsNvuMOcHwhmzzeFyFQGHG6qHylUDQRsC-5jJsBrAKkZIm-EGWmFUi-ETi3YgEHM1Kx7Kw4cOcyJVBHLOadAGAlKKjrRpiHDvYGFI27Tasi2JYwb3557M2wpi6mhM1hY1bzHsY1-EQ0kOvZzfOrPP2w37E7GKoGVjyzfmZ3CTHIv1UftvxBJxcNRM1O57TsDgn5oJ452ADDKHAlFHNnlOaWfFvfthV9HE1WD8QQCKMGt0EKOMa2H7TL2d5m4JpbzFGPXPoDmJQdkZeKvvHWmGai4fZYb7_rKxIUcjdalLiO3--VynJL92q_SIvVjhnjXn0rLemFpuvFpBIZEjB1_Qvg2pdXce4UsV-Rtr4e8C6iBAMJSEL-Yrnbz598mU2QL1NrNtAYfYhW7XGhlrLU1nrUEMboj17YMyNB1UBby6-wW4GfFI6GDz2Q7LB6J3fAk-E02GKx_TDJbI5vxt8b7XN2Eul8GVIQeC1wmBXW12eqeo2dJOlXovH6-JJ03PoKGOP4hU_ZH7TTr6gI9eB86fiBbmN8bF3t91v_3iBswXF_Rd2Hx8H7f-SqjLZC5Qgh9w_U479aXHveRKz66bbcymP2RB6k6tIl5o3T4jT2LtOxdhd-A6JljwVhdbWHru913cPY_lXHhYcZWDNLRjh4-Xb4urrObVU1cq3gz9U4sXjCsIPCXx-jvRzsodHo-SNdcPl2E2ertfMxnJQHE2a1CSL94YD66JrEpM0MAokxTSRz32GAxNqL8aqRROPKyeDj59p8tsYmaEoEjUg3YxxXIDOxJiut3D50CkVuxDRsXN5y1qdUwAsKTbFCncYBvNcFp22yRE_3sGm43L1ST7W40Z752fskSI1BGV41vWogYs4d-tD8dhzjiBoamVG3jlQro7SqbaUeMcNNI1gkfeRboMflfZkvFyqDlSf19gl06Q21hSpPhnmvKSRQ8N_T_0ZIj1RyDqa1jVkDqWKJ61cYEHPu3oEe_tgCUSrk033WTq5JJxf70HIq7bvRfPUUfTC_QMWR-m8RwnbA_GbR48aQWuL13wHwSz0RDdUhoBZcSxIFboV8-Z_LNqvJ7iGOmXTvVOMZU43JtD5hOCGLhr0-boC8K-TbNeLiypxRfISl_1k7S-WyweuL2tIhUoW5wscIUsBMpHWRJldPhoqCLLZxLVtt13gKh_orTJ0g0eZilEAihY9JcEQRQmhw-Oea-GYx7KXPnqAZsqL-wWe-_4keupoxlmlz2c3_hhQyIzVZyDbaY7SdiZxN8gBFJUfeNzzEoUsd8E6cvMaIeD0RZFCqtunlFfEkhgU8t-mgjjt0ekCVelKZwxK4GY0YqUtfXPtMN3SMBYkE_9DXTfQ_dnpixELZu1JRZ_usam_3uuF_iunYu_9Aj8hKLee_YkSmhSnZruVvG1aIWn2_HqqHekOJJer0jH0A8mN_uqAVXC6B7JGOVFISVM7gBF6OWIZ1TSpy9V825LnyTwkUI7Mv2SfQYNWDddL9i8MepCi4zBYchatEFzkLiQECvi3l66zwE-NnNKRXGk3LJTclNMayNIYzBfxmgGZRCTnxSIpWMfbVzXjp98S9Y_5IR4JGeypZIXA5woLog71L0CIJVC5HyHMOpD-jRRPJLA_TAkItwjipLtziOllfymvmDzyfsn7s-e2s5Tgt6S7-ZEPnCsFjRQZuH6jXh7LEpoKGxpWLNnrPqbNR-QR9kdgVtY4CTGZUTcwMXxYFT31a19NUNfcAJBceU0qOzY67C0j-MZHFEQ93S4E3otYJSObAG79ma_1sCTPe1819v0n3f4y03e"
      responses:
        "200":
          description: Пароль успешно изменен
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Пароль успешно изменен. Теперь вы можете войти."

  /2fa/setup:
    get:
      tags:
        - Auth
      summary: Инициация настройки 2FA
      description: На сервере генерируется секретный ключ и QR-код для сканирования в приложении (Google Authenticator). Ссылка на qr-код посылается клиенту
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Данные для настройки получены
          content:
            application/json:
              schema:
                type: object
                properties:
                  qrCodeUrl:
                    type: string
                    example: "data:image/png;base64,..."
                    description: Ссылка для отображения QR-кода

  /2fa/enable:
    post:
      tags:
        - Auth
      summary: Активация 2FA
      description: Проверяет первый код из приложения и окончательно активирует 2FA для аккаунта пользователя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: "^[0-9]{6}$"
                  example: "123456"
                  description: 6-значный код из приложения аутентификатора
      responses:
        "200":
          description: Активация 2FA для аккаунта пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "2FA успешно включена"
        "400":
          description: Неверный код подтверждения
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Неверный код подтверждения"

  /2fa/verify:
    post:
      tags:
        - Auth
      summary: Проверка кода 2FA при входе в аккаунт
      description: Принимает временный ID пользователя и 6-значный код из приложения для завершения авторизации.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, code] # 🎯 userId берем из ответа /login
              properties:
                userId:
                  type: string
                  format: uuid
                  description: Временный идентификатор пользователя
                  example: "a14c494e-2e2f-4622-9218-d5f5e770b09c"
                code:
                  type: string
                  description: Шестизначный код из Google Authenticator
                  pattern: "^[0-9]{6}$"
                  example: "123456"
      responses:
        "200":
          description: Успешный вход - выдаются токены и информация о пользователе
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "401":
          description: Ошибка идентификации пользователя при входе с 2FA
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Неверный код 2FA"

  /google:
    get:
      tags:
        - Auth
      summary: Инициация входа через Google (OAuth + OIDC)
      description: Перенаправляет пользователя на страницу выбора аккаунта Google.
      responses:
        "302":
          description: Редирект на Google OAuth сервер
          headers:
            Location:
              schema:
                type: string
                example: "https://accounts.google.com?..."

  /google/callback:
    get:
      tags:
        - Auth
      summary: Обработка ответа от Google (OAuth + OIDC)
      description: Принимает код авторизации от Google, обменивает его на профиль пользователя и выдает токены нашего приложения.
      parameters:
        - name: code
          in: query
          required: true
          description: Код авторизации, предоставленный Google
          schema:
            type: string
      responses:
        "302":
          description: Успешный вход. Редирект на фронтенд с токеном в URL или установка Refresh-куки.
          headers:
            Location:
              schema:
                type: string
                example: "http://localhost:5173/auth/success?token=..."
        "400":
          description: Ошибка авторизации (неверный код или отмена пользователем)

