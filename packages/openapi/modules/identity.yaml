tags:
  - name: подмодуль Auth (модуль Identity)
    description: Регистрация, логин и управление сессиями
  - name: подмодуль Profile (модуль Identity)
    description: Данные пользователя и настройки профиля

paths:
  /register:
    post:
      tags:
        - Auth
      summary: Регистрация нового пользователя
      description: Создает аккаунт и отправляет письмо для подтверждения
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Успешная регистрация и создание записи в БД в таблице Users
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Пользователь создан!"
                  user:
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: "dff1ff06-2668-4ca6-a199-5a4f742ca02a"
                      email:
                        type: string
                        format: email
                        example: "test@example.com"
        "400":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              examples:
                EmailConflict:
                  value: { "message": "Некорректный email или пароль" }
                  summary: Скрытая ошибка дубликата почты
                NameConflict:
                  value: { "message": "Это имя уже занято, выберите другое" }
                  summary: Ошибка дубликата логина

  /login:
    post:
      tags:
        - Auth
      summary: Авторизация (Логин)
      description: Стандартный вход в профиль пользователя. Если включена 2FA, возвращает информацию для второго шага
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Успешный вход или шаг 2FA
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthSuccessResponse"
                  - $ref: "#/components/schemas/Login2FARequiredResponse"
        "401":
          description: Неверный логин или пароль
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Неверный email или пароль"
        "403":
          description: Аккаунт не активирован
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Аккаунт не активирован. Проверьте почту."

  /profile/me:
    get:
      tags:
        - Profile
      summary: Получение данных текущего пользователя
      description: Возвращает полную информацию о профиле для ProfilePage (Пункт 11.3)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Данные профиля успешно получены
          content:
            application/json:
              schema:
                $ref: "../components/schemas.yaml#/User"

  /profile/update:
    patch:
      tags:
        - Profile
      summary: Редактирование текстовых данных профиля
      description: Обновление имени, даты рождения, телефона и пола пользователя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 20
                  example: "user_123"
                birthday:
                  type: string
                  format: date
                  nullable: true
                  description: Дата рождения (ДД.ММ.ГГГГ в UI, YYYY-MM-DD на сервере)
                  example: "1995-05-20"
                phone:
                  type: string
                  nullable: true
                  description: Номер телефона в международном формате
                  example: "+7 (999) 123-45-67"
                gender:
                  type: string
                  nullable: true
                  enum: [MALE, FEMALE]
                  description: Пол пользователя (Enum из Prisma)
                  example: "MALE"
      responses:
        "200":
          description: Успешное обновление профиля
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Профиль успешно обновлен"
                  user:
                    $ref: "../components/schemas.yaml#/User"

  /profile/avatar:
    patch:
      tags:
        - Profile
      summary: Загрузка или обновление аватара
      description: Принимает файл изображения и сохраняет на сервере
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data: # 🎯 Важно: для загрузки файлов используем этот тип
            schema:
              type: object
              properties:
                avatar: # Название поля в твоем FormData
                  type: string
                  format: binary
                  description: Файл изображения (jpg, png)
      responses:
        "200":
          description: Аватар успешно обновлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Аватар обновлен"
                  avatarUrl:
                    type: string
                    example: "/uploads/avatars/avatar-1774609004286-587742782.jpg"
        "400":
          description: Аватар не удалось загрузить
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Только изображения (jpeg, jpg, png, webp) до 2МБ"

  /logout:
    post:
      tags:
        - Auth
      summary: Выход из текущей сессии
      description: Удаляет Refresh-токен из куки и инвалидирует текущую сессию
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Успешный выход
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Выход выполнен успешно"

  /logout-all:
    post:
      tags:
        - Auth
      summary: Выход со всех устройств
      description: Инвалидирует все активные сессии пользователя в базе данных
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Все сессии завершены
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Выход со всех устройств выполнен успешно"

  /refresh:
    post:
      tags:
        - Auth
      summary: Обновление пары токенов (access и refresh)
      description: Сервер принимает refreshToken из куки и выдает новую пару токенов.
      responses:
        "200":
          description: Токены обновлены
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6ImRmZjFmZjA2LTI2NjgtNGNhNi1hMTk5LTVhNGY3NDJjYTAyYSIsImVtYWlsIjoiZG9zZW4zMEB0dXRhbWFpbC5jb20iLCJyb2xlIjoiVVNFUiIsImlhdCI6MTc3NDYxMTEyNywiZXhwIjoxNzc0NjExNzI3fQ.NMpQPb1K2fttT-xEbO2dscsjEfB_UGtiJCgoqKu9wBg"
                  user:
                    $ref: "../components/schemas.yaml#/User"

        "401":
          description: Refresh-токен невалиден или просрочен
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Сессия не найдена"

  /change-password:
    patch:
      tags:
        - Auth
      summary: Смена пароля из профиля
      description: Изменение пароля пользователя в форме в профиле
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Успешное изменение пароля
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Пароль успешно изменен"
        "400":
          description: Неудачное изменение пароля (текущий пароль введен неверно)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Текущий пароль введен неверно"

  /delete-account:
    delete:
      tags:
        - Auth
      summary: Удаление аккаунта
      description: Полное удаление аккаунта пользователя
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  format: password
                  minLength: 1
                  description: Текущий пароль пользователя
                  example: "SafePassword123!"
      responses:
        "204":
          description: Успех в удалении аккаунта
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Аккаунт успешно удален"
        "400":
          description: Неудача в удалении аккаунта
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Неверный пароль для удаления аккаунта"

  /activate/{token}:
    get:
      tags:
        - Auth
      summary: Активация аккаунта
      description: Принимает токен из ссылки в письме, активирует пользователя в БД и перенаправляет на фронтенд
      parameters:
        - name: token
          in: path
          required: true
          description: Уникальный токен активации из письма
          schema:
            type: string
            example: "abc123token"
      responses:
        "302":
          description: Успешная активация. Редирект на фронтенд с параметром успеха.
          headers:
            Location:
              description: URL фронтенда с флагом активации
              schema:
                type: string
                example: "http://localhost:5173/auth?activated=true"
        "400":
          description: Токен невалиден или срок его действия истек
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Неверный или просроченный токен активации"

  /forgot-password:
    post:
      tags:
        - Auth
      summary: Запрос на восстановление пароля
      description: Отправляет письмо с токеном на email для перехода на форму восстановления пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  minLength: 1
                  example: "test@example.com"
                captchaToken:
                  type: string
