tags:
  - name: Payment
    description: нтеграция с платежным шлюзом ЮKassa. Работа с транзакциями и вебхуками.

paths:
  /webhook:
    post:
      summary: Обработка уведомлений от ЮKassa
      description: Публичный эндпоинт для входящих HTTP-уведомлений. Защищен проверкой IP-адресов.
      tags: [Payment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  example: "payment.succeeded"
                object:
                  type: object
                  properties:
                    id:
                      type: string
                    status:
                      type: string
                    metadata:
                      type: object
                      properties:
                        orderId:
                          type: string
      responses:
        "200":
          description: Уведомление успешно обработано
        "403":
          description: Доступ запрещен (неверный IP отправителя)
