tags:
  - name: Catalog
    description: Навигация, бренды и поиск мототехники

paths:
  # 1.Главные карточки раздела "/catalog" (мотоциклы, мотоэкипировка, запчасти):
  /categories:
    get:
      tags: [Catalog]
      summary: Список корневых категорий
      responses:
        "200":
          description: Получены главные категории каталога
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "../components/schemas.yaml#/SiteCategory"

  # 2.Список брендов для страницы "/catalog/motorcycles":
  /brands:
    get:
      tags: [Catalog]
      summary: Список брендов с пагинацией
      parameters:
        # Имя бренда:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
          # Ограничение по количеству выводимых карточек:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: search
          in: query

      responses:
        "200":
          description: Список всех брендов
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "../components/schemas.yaml#/BrandInPage"
                  page:
                    type: number
                    format: integer
                    description: текущая страница
                  pages:
                    type: number
                    format: integer
                    description: общее количество страниц при текущем лимите
                  total:
                    type: integer
                    description: общее количество брендов

  # 3.Поиск и фильтрация для страницы "/catalog/motorcycles/{brand}":
  /motorcycles:
    get:
      tags: [Catalog]
      summary: Поиск мотоциклов с фильтрами
      parameters:
        # URL бренда:
        - name: brandSlug
          in: query
          required: true
          schema: { type: string }
        # Мои фильтры:
        - name: minPrice
          in: query
          schema: { type: integer }
        - name: maxPrice
          in: query
          schema: { type: integer }
        - name: minYear
          in: query
          schema: { type: integer }
        - name: maxYear
          in: query
          schema: { type: integer }
        - name: category
          in: query
          schema: { $ref: "../components/schemas.yaml#/MotoCategory" }
        - name: minDisplacement
          in: query
          schema: { type: integer }
        - name: maxDisplacement
          in: query
          schema: { type: integer }
        - name: minPower
          in: query
          schema: { type: number }
        - name: maxPower
          in: query
          schema: { type: number }
        - name: transmission
          in: query
          schema: { $ref: "../components/schemas.yaml#/TransmissionType" }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: search
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema:
            {
              type: string,
              enum:
                [
                  price_asc,
                  price_desc,
                  year_desc,
                  rating_desc,
                  name_asc,
                  name_desc,
                ],
            }
      responses:
        "200":
          description: Отфильтрованный список мотоциклов
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "../components/schemas.yaml#/MotorcycleShort"
                  page:
                    type: integer
                    description: текущая страница
                  pages:
                    type: integer
                    description: всего страниц
                  total:
                    type: integer
                    description: количество мотоциклов конкретного бренда

  # 4.Получние предварительных результатов поиска (в главном поиске):
  /search/suggest:
    get:
      summary: Автодополнение поиска (подсказки)
      tags: [Catalog]
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 2 }
      responses:
        200:
          description: Список из 7 совпадений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "../components/schemas.yaml#/MotorcycleSuggest"

  # 5.Информация о аналогичных мотоциклах (рекоммендации):
  /motorcycles/{slug}/related:
    get:
      summary: Рекомендованные мотоциклы (похожие)
      tags: [Catalog]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        200:
          description: Список из 4 мотоциклов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "../components/schemas.yaml#/MotorcycleRelated"

  # 6.Детальная информация о конкретном мотоцикле по его slug:
  /motorcycles/{brandSlug}/{slug}:
    get:
      summary: Детальная информация о мотоцикле
      tags: [Catalog]
      parameters:
        - in: path
          name: brandSlug
          required: true
          schema: { type: string }
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        200:
          description: Полные данные о конкретной модели мотоцикла
          content:
            application/json:
              schema:
                $ref: "../components/schemas.yaml#/MotorcycleFull"

  # 7.Запуск синхронизации PostgreSQL и Elasticsearch:
  /sync-search:
    get:
      summary: Синхронизация базы данных с Elasticsearch
      description: >
        Извлекает все записи из PostgreSQL (Prisma) и выполняет Bulk-индексацию 
        в индекс 'motorcycles'. Используется для обновления поискового индекса 
        после массового импорта данных (CSV).
      tags:
        - Admin
      responses:
        200:
          description: Синхронизация успешно завершена
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Синхронизация завершена! Проверь консоль бэкенда."

  # 8.Получение Sitemap.xml для модуля каталога:
  /sitemap.xml:
    get:
      summary: Получение динамического Sitemap
      tags: [Catalog]
      responses:
        200:
          description: XML файл со всеми ссылками
          content:
            application/xml:
              schema:
                type: string

  # 9..Детальная информация о конкретном мотоцикле по его id:
  /motorcycles/{id}:
    get:
    summary: Получить детальную информацию о мотоцикле по ID
    description: Возвращает полные данные мотоцикла, включая технические характеристики, бренд и список изображений.
    tags: [Catalog]
    security:
      - bearerAuth: [] # Опционально, так как используется optionalAuth
    parameters:
      - name: id
        in: path
        required: true
        description: UUID мотоцикла
        schema:
          type: string
          format: uuid
    responses:
      200:
        description: Данные мотоцикла успешно получены
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MotorcycleFull"
      404:
        description: Мотоцикл с таким ID не найден в базе данных
