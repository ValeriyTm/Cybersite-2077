  type: string
  enum:
    - "ALLROUND"
    - "ATV"
    - "CLASSIC"
    - "CROSS_MOTOCROSS"
    - "CUSTOM_CRUISER"
    - "ENDURO_OFFROAD"
    - "MINIBIKE_CROSS"
    - "MINIBIKE_SPORT"
    - "NAKED_BIKE"
    - "PROTOTYPE_CONCEPT"
    - "SCOOTER"
    - "SPEEDWAY"
    - "SPORT"
    - "SPORT_TOURING"
    - "SUPER_MOTARD"
    - "TOURING"
    - "TRIAL"
    - "UNSPECIFIED"

CoolingType:
