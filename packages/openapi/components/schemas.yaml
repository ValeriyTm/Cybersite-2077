# Заказы:
OrderCreateRequest:
  type: object
  required: [items, address, coords, deliveryInfo, totalPrice]
  properties:
    shouldPay:
      type: boolean
      description: Нужно ли сразу генерировать ссылку на оплату
    items:
      type: array
      items:
        type: object
        properties:
          id: { type: string, format: uuid }
          model: { type: string }
          quantity: { type: integer }
          price: { type: number }
    address: { type: string, example: "Москва, ул. Тверская, 1" }
    coords:
      type: object
      properties:
        lat: { type: number }
        lng: { type: number }
    deliveryInfo:
      type: object
      properties:
        cost: { type: number }
        days: { type: number }
        distanceKm: { type: number }
        estimatedDate:
          type: string
          format: date-time
          description: Ожидаемая дата прибытия
          example: "2026-04-05"
        warehouse:
          $ref: "#/WarehouseExtended"
