# Каталог:

MotorcycleShort:
  type: object
  required: [id, model, slug, price, year, displacement, mainImage]
  properties:
    id:
      type: string
      format: uuid
      example: ebe237bc-2944-418e-99f3-9d4f7802ee21
    model:
      type: string
      example: "Access AMS 4.30 SuperMoto EFI"
    slug:
      type: string
      example: "access-ams-430-supermoto-efi2016"
    price:
      type: integer
      description: "Цена в рублях"
      example: 800000
    year:
      type: integer
      example: 2023
    displacement:
      type: integer
      description: "Объем двигателя в см3"
      example: 750
    rating:
      type: number
      format: float
      example: 4.8
    mainImage:
      type: string
      description: "имя главного изображения в папке static/motorcycles/"
      example: "access-ams-430-supermoto-efi2016.jpg"
    brand:
      type: string
      description: "Название бренда (чтобы не делать лишний запрос)"
      example: "Access"
    brandSlug:
      type: string
      example: "access"
    category:
      $ref: "#/MotoCategory"
    createdAt:
      type: string
      example: "2026-03-31T06:32:32.130Z"
    power:
      type: number
      example: 29.5
    transmission:
      $ref: "#/TransmissionType"
    totalInStock:
      type: integer
      description: количество товара, доступное для заказа. Встречается не во всех эндпоинтах. Когда-нибудь поправлю.
    discountData:
      type: object
      properties:
        discountPercent:
          type: integer
          description: процент скидки; может быть null, если скидки на данную модель нет
        isPersonal:
          type: boolean
          description: является ли скидка персональной (false для отсутствия скидки и для глобальной скидки)
        originalPrice:
          type: integer
          description: цена до применения скидки
        finalPrice:
          type: integer
          description: цена после применения скидки (если скидки нет, то finalPrice == originalPrice)

MotorcycleFull:
  type: object
  required:
    [
      id,
      model,
      slug,
      brandId,
      siteCategoryId,
      price,
      year,
      displacement,
      rating,
      images,
    ]
  properties:
    id:
      type: string
      format: uuid
      example: ebe237bc-2944-418e-99f3-9d4f7802ee21
    model:
      type: string
      example: "Cleveland Iron One"
    slug:
      type: string
      example: "cleveland-iron-one2018"

    # Связи (объекты для удобства фронтенда):
    brand:
      $ref: "#/Brand"
    brandId:
      type: string
      format: uuid
      example: 70b8249b-6b08-4b59-972c-30e49855fcb1
    siteCategory:
      type: object
      properties:
        name: { type: string, example: "Мотоциклы" }
        slug: { type: string, example: "motorcycles" }
    siteCategoryId:
      type: string
      format: uuid
      example: 081b4c44-59b1-4b2a-884b-f4bcfdc7c21e

    # Основные характеристики:
    category:
      $ref: "#/MotoCategory"
    year:
      type: integer
      example: 2023
    displacement:
      type: number
      format: integer
      description: "Объем двигателя (см3)"
      example: 750
    power:
      type: number
      format: float
      nullable: true
      description: "Мощность (л.с.)"
      example: 217.6
    topSpeed:
      type: integer
      nullable: true
      description: "Макс. скорость (км/ч)"
      example: 299
    fuelConsumption:
      type: number
      nullable: true
      description: "Расход топлива (л/100км)"
      example: 6.3
    engineType:
      type: string
      nullable: true
      example: "Single cylinder, four-stroke"
    fuelSystem:
      type: string
      nullable: true
    coolingSystem:
      $ref: "#/CoolingType"
    gearbox:
      $ref: "#/GearboxType"
    transmission:
      $ref: "#/TransmissionType"
    starter:
      $ref: "#/StarterType"
    frontTyre:
      type: string
      nullable: true
    rearTyre:
      type: string
      nullable: true
    frontBrakes:
      type: string
      nullable: true
    rearBrakes:
      type: string
      nullable: true
    colors:
      type: array
      items:
        type: string
      example: ["gray", "lightgray", "white", "blue"]
    comments:
      type: string
      nullable: true
      description: "Подробное описание или примечания"
    rating:
      type: number
      format: float
      example: 4.9
    price:
      type: integer
      description: "Цена в рублях"
      example: 800000
    images:
      type: array
      items:
        $ref: "#/ProductImage"
    createdAt:
      type: string
      example: "2026-03-31T06:32:03.893Z"
    updatedAt:
      type: string
      example: "2026-03-31T06:32:03.893Z"
    totalInStock:
      type: integer
      description: количество товара, доступное для заказа. Встречается не во всех эндпоинтах. Когда-нибудь поправлю.
    discountData:
      type: object
      properties:
        discountPercent:
          type: integer
          description: процент скидки; может быть null, если скидки на данную модель нет
        isPersonal:
          type: boolean
          description: является ли скидка персональной (false для отсутствия скидки и для глобальной скидки)
        originalPrice:
          type: integer
          description: цена до применения скидки
        finalPrice:
          type: integer
          description: цена после применения скидки (если скидки нет, то finalPrice == originalPrice)

ProductImage:
  type: object
  properties:
    id: { type: string, format: uuid }
    url: { type: string, example: "/uploads/honda-cbr.jpg" }
    isMain: { type: boolean, example: true }

