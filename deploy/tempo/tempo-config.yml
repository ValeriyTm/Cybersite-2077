server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"
        grpc:
          endpoint: "0.0.0.0:4317"

storage:
  trace:
    backend: local # Храним локально
    local:
      path: /var/lib/tempo/traces
    wal:
      path: /var/lib/tempo/wal # Write-ahead log
