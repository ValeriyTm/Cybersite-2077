services:
  # ------------Инфраструктура:--------------- #
  nginx:
    build: ./nginx
    container_name: cybersite_nginx_prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx отдаёт файлы фронтенда напрямую:
      - ../apps/web/dist:/usr/share/nginx/html
    networks:
      - cybersite_net
    depends_on:
      - server
  # ------------Бэкенд:--------------- #
  server:
    build:
      context: .. # Поднимаемся в корень проекта
      dockerfile: Dockerfile
      target: server # Выбираем стадию бэкенда
    container_name: cybersite_server_prod
    restart: always
    env_file: ../.env.prod # Файл из корня проекта
    depends_on:
      - postgres
      - redis
      - mongodb
    networks:
      - cybersite_net

  # ------------Базы данных:--------------- #

  # Основная база: PostgreSQL с расширением PostGIS для реализации карты
  postgres:
    image: postgis/postgis:15-3.3 # Специальный образ с уже установленным PostGIS
    container_name: cybersite_postgres_prod
    restart: always
    env_file:
      - ../.env.prod # Файл из корня проекта
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cybersite_net

  # Кэш и очереди: Redis (для корзины и BullMQ)
  redis:
    image: redis:7-alpine
    container_name: cybersite_redis_prod
    restart: always
    volumes:
      - redis_data:/data
    env_file:
      - ../.env.prod # Файл из корня проекта
    networks:
      - cybersite_net

  # MongoDB (для отзывов и новостей)
  mongodb:
    image: mongo:6.0
    container_name: cybersite_mongodb_prod
    restart: always
    env_file:
      - ../.env.prod # Файл из корня проекта
    volumes:
      - mongodb_data:/data/db
    networks:
      - cybersite_net

  # Поисковый движок:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: cybersite_elasticsearch_prod
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - cybersite_net

    # --------------------------------------------------- #
networks:
  cybersite_net:
    driver: bridge

volumes:
  # Для PostgreSQL:
  postgres_data:
  # Для Redis:
  redis_data:
  # Для MongoDB:
  mongodb_data:
  # Для Elascticsearch:
  es_data:
